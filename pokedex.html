<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pokedex.css">
    <title>Pokedex</title>
</head>
<body>
    <h1>MAESTRO POKEMON: JUAN JOSE DE PUEBLO REY</h1>
    <img src="./pokemon1.jpg" width="400px" style="top:0px;">
    <input type="text" placeholder="ditto" id="pokename" name="pokename"
    class="placeholder"> <br>
    <img src="./pokebola.jpg" alt="Pokemaster" id="pokeImg" width="250px"
    class="pokeImg"><br>

    <div id="pokeName" class="pokeimg1" style="left: 500px; top:300px; font-size: 30px;"></div>
    <div id="pokeHe" class="pokeimg1" style="left: 100px; top:220px; font-size: 15px;"></div>
    <div id="pokeWe" class="pokeimg1" style="left: 100px; top:240px; font-size: 15px;"></div>
    <div id="poketype" class="pokeimg1" style="left: 100px; top:260px; font-size: 15px;"></div>
    <div id="pokeitem" class="pokeimg1" style="left: 100px; top:280px; font-size: 15px;"></div>
    <div id="pokemove1" class="pokeimg1" style="left: 100px; top:280px; font-size: 15px;"></div>
    <div id="pokemove2" class="pokeimg1" style="left: 100px; top:300px; font-size: 15px;"></div>
    <div id="pokemove3" class="pokeimg1" style="left: 100px; top:320px; font-size: 15px;"></div>
    <div id="pokemove4" class="pokeimg1" style="left: 100px; top:340px; font-size: 15px;"></div>

    <div id="pokeid" class="pokeimg1" style="left:600px; top: 500px; font-size: 200px; color: yellow;"></div>
    <div id="pokeorder" class="pokeimg1" style="left:700px; top: 500px; font-size: 20px; color: orange;"></div>
    <button onclick="fetchPokemon()" class="button">Presiona</button>
    <div class="grafica">
        <canvas id="miCanvas"></canvas>
    </div>
    <script src="pokedex.js"></script>
    <script src="Chart.js"></script>
</body>
</html>
